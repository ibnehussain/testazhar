name: Copilot Eval Gate

on: [pull_request]

permissions:
  models: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Validate required secrets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -n "$GITHUB_TOKEN" || (echo "GITHUB_TOKEN is not available" && exit 1)

      - name: Run evals (with retry for transient 5xx)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ATTEMPTS=3
          for i in $(seq 1 $ATTEMPTS); do
            echo "Eval attempt $i/$ATTEMPTS..."
            if promptfoo eval --output results.json; then
              echo "Eval succeeded."
              exit 0
            fi
            if [ "$i" -lt "$ATTEMPTS" ]; then
              echo "Eval failed (likely transient API issue). Retrying in 10s..."
              sleep 10
            fi
          done
          echo "Eval failed after $ATTEMPTS attempts."
          exit 1