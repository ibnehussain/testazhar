name: Copilot Eval Gate

on: [pull_request]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Validate required secrets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -n "$GITHUB_TOKEN" || (echo "GITHUB_TOKEN is not available" && exit 1)

      - name: Run evals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: promptfoo eval --output results.json

      - name: Check pass rate
        run: |
          PASS=$(python3 -c "
          import json
          with open('results.json') as f:
              d = json.load(f)
          s = d['results']['stats']
          rate = s['successes'] / s['total'] * 100
          print(f'{rate:.1f}')
          ")
          echo "Eval pass rate: $PASS%"
          python3 -c "exit(0 if float('$PASS') >= 80 else 1)" || \
            (echo "BLOCKED: Pass rate $PASS% is below 80% threshold." && exit 1)


jobs:
  rag-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ragas openai

      - name: Run RAGAS faithfulness eval
        env:
          # GITHUB_TOKEN is injected automatically — no secret to configure.
          # eval_rag.py reads GITHUB_TOKEN first, falls back to OPENAI_API_KEY.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/rag/eval_rag.py
          echo "✅ RAG faithfulness gate passed (≥ 0.85)"
        # Exit code 1 from eval_rag.py blocks the PR automatically