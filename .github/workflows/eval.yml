name: Copilot Eval Gate

on:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Run evals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: promptfoo eval --output results.json

      - name: Check pass rate threshold
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path("results.json")
          if not path.exists():
              print("results.json was not created")
              sys.exit(1)

          with path.open() as f:
              data = json.load(f)

          stats = data.get("results", {}).get("stats", {})
          total = stats.get("total", 0)
          successes = stats.get("successes", 0)

          if total == 0:
              print("No assertions were run")
              sys.exit(1)

          rate = (successes / total) * 100
          print(f"Eval pass rate: {rate:.1f}% ({successes}/{total})")
          if rate < 80:
              print("BLOCKED: Pass rate below 80% threshold.")
              sys.exit(1)
          print("PASSED: Eval gate cleared.")
          PY
 